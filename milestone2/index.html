<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookSphere - Book Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1512; --paper: #f5f0e8; --cream: #ede7d9;
      --rust: #b85c2c; --gold: #c9a84c; --muted: #7a6f62; --border: #cfc5b4;
    }
    body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; font-weight: 300; }

    nav { background: var(--ink); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 52px; }
    .brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; color: #f5f0e8; text-decoration: none; }
    .brand span { color: #d4733f; }
    nav a { color: #f5f0e8; text-decoration: none; font-size: 0.85rem; padding: 0.4rem 0.9rem; border-radius: 2px; }
    nav a:hover { background: rgba(255,255,255,0.1); }
    nav a.active { background: var(--rust); }

    .hero { background: var(--ink); padding: 2.5rem 2rem 3rem; text-align: center; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; color: #f5f0e8; margin-bottom: 0.4rem; }
    .hero h1 span { color: #d4733f; }
    .hero p { color: #9a8f84; font-size: 0.95rem; margin-bottom: 1.8rem; }

    .search-bar { display: flex; max-width: 580px; margin: 0 auto; border-radius: 3px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .search-bar input { flex: 1; padding: 0.85rem 1.2rem; border: none; font-family: inherit; font-size: 1rem; outline: none; }
    .search-bar button { padding: 0 1.5rem; background: var(--rust); color: #fff; border: none; font-family: inherit; font-size: 0.9rem; font-weight: 500; cursor: pointer; }
    .search-bar button:hover { background: #d4733f; }

    .toolbar { background: var(--cream); border-bottom: 1px solid var(--border); padding: 0.7rem 2rem; display: none; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .toolbar span { font-size: 0.85rem; color: var(--muted); }
    .toolbar strong { color: var(--ink); }
    .toolbar select { padding: 0.3rem 0.5rem; border: 1px solid var(--border); border-radius: 2px; font-family: inherit; font-size: 0.82rem; cursor: pointer; }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    #status { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.95rem; }

    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; display: flex; flex-direction: column; transition: box-shadow 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
    .card .no-img { height: 180px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0.5rem; }
    .card .info { padding: 0.75rem; flex: 1; display: flex; flex-direction: column; gap: 0.2rem; }
    .card .title { font-family: 'Playfair Display', serif; font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
    .card .title a { color: var(--ink); text-decoration: none; }
    .card .title a:hover { color: var(--rust); }
    .card .author { font-size: 0.75rem; color: var(--rust); font-weight: 500; }
    .card .year { font-size: 0.7rem; color: var(--muted); margin-top: auto; padding-top: 0.3rem; }

    #pagination { display: flex; justify-content: center; gap: 0.4rem; margin-top: 2rem; flex-wrap: wrap; }
    .pg-btn { min-width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 2px; background: #fff; color: var(--ink); font-family: inherit; font-size: 0.82rem; cursor: pointer; }
    .pg-btn:hover { border-color: var(--rust); color: var(--rust); }
    .pg-btn.active { background: var(--rust); border-color: var(--rust); color: #fff; cursor: default; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="brand">Book<span>Sphere</span></a>
  <div style="display:flex; gap:0.3rem;">
    <a href="../index.html">Project Home</a>
    <a href="index.html" class="active">Search</a>
    <a href="bookshelf.html">My Bookshelf</a>
  </div>
</nav>

<div class="hero">
  <h1>Find your next <span>great read</span></h1>
  <p>Search millions of books using the Google Books API</p>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search by title, author, or keyword..." autocomplete="off"/>
    <button id="search-btn">Search</button>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <span>Results for <strong id="query-label"></strong></span>
  <div>
    <label for="page-select">Page: </label>
    <select id="page-select"></select>
  </div>
</div>

<main>
  <div id="status">Enter a search term above to find books.</div>
  <div id="grid"></div>
  <div id="pagination"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
var API = 'https://www.googleapis.com/books/v1/volumes?key=AIzaSyDPgWdyzo2JAkyzDwkMOx0Hjy8RhyEF9BU';
var PER_PAGE = 12;
var allBooks = [];
var currentPage = 1;

function renderPage(page) {
  currentPage = page;
  var slice = allBooks.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  var grid = $('#grid').empty();

  for (var i = 0; i < slice.length; i++) {
    var book = slice[i];
    var info = book.volumeInfo || {};
    var title = info.title || 'Untitled';
    var author = info.authors ? info.authors[0] : 'Unknown Author';
    var year = info.publishedDate ? info.publishedDate.substring(0, 4) : '';
    var imgUrl = null;
    if (info.imageLinks && info.imageLinks.smallThumbnail) {
      imgUrl = info.imageLinks.smallThumbnail.replace('http://', 'https://');
    }
    var url = 'book-detail.html?id=' + encodeURIComponent(book.id);
    var imgHtml = imgUrl ? '<img src="' + imgUrl + '" alt="cover"/>' : '<div class="no-img">' + title + '</div>';
    var card = '<div class="card">' + imgHtml +
      '<div class="info">' +
        '<div class="title"><a href="' + url + '">' + title + '</a></div>' +
        '<div class="author">' + author + '</div>' +
        (year ? '<div class="year">' + year + '</div>' : '') +
      '</div></div>';
    grid.append(card);
  }

  buildPagination();
  $('#page-select').val(page);
}

function buildPagination() {
  var total = Math.ceil(allBooks.length / PER_PAGE);
  var pag = $('#pagination').empty();
  if (total <= 1) return;
  for (var i = 1; i <= total; i++) {
    var btn = $('<button class="pg-btn">').text(i);
    if (i === currentPage) {
      btn.addClass('active');
    } else {
      btn.data('page', i).on('click', function() {
        renderPage($(this).data('page'));
        window.scrollTo(0, 0);
      });
    }
    pag.append(btn);
  }
}

function buildPageSelect(count) {
  var sel = $('#page-select').empty();
  var pages = Math.ceil(count / PER_PAGE);
  for (var i = 1; i <= pages; i++) {
    sel.append('<option value="' + i + '">Page ' + i + '</option>');
  }
}

$('#page-select').on('change', function() {
  renderPage(parseInt($(this).val()));
  window.scrollTo(0, 0);
});

function doSearch() {
  var q = $.trim($('#search-input').val());
  if (q === '') return;

  $('#status').text('Searching...').show();
  $('#grid').empty();
  $('#pagination').empty();
  $('#toolbar').hide();
  allBooks = [];

  $.ajax({
    url: API,
    data: { q: q, maxResults: 40, startIndex: 0 },
    dataType: 'json',
    success: function(data) {
      allBooks = data.items || [];
      $.ajax({
        url: API,
        data: { q: q, maxResults: 20, startIndex: 40 },
        dataType: 'json',
        success: function(data2) {
          allBooks = allBooks.concat(data2.items || []);
          showResults(q);
        },
        error: function() {
          showResults(q);
        }
      });
    },
    error: function() {
      $('#status').text('Search failed. Please check your connection and try again.');
    }
  });
}

function showResults(q) {
  if (allBooks.length === 0) {
    $('#status').text('No results found for "' + q + '".');
    return;
  }
  $('#status').hide();
  $('#query-label').text('"' + q + '"');
  buildPageSelect(allBooks.length);
  $('#toolbar').css('display', 'flex');
  renderPage(1);
}

$('#search-btn').on('click', function() { doSearch(); });
$('#search-input').on('keydown', function(e) { if (e.which === 13) doSearch(); });
</script>

</body>
</html>
