<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookSphere – Book Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1512;
      --paper:      #f5f0e8;
      --cream:      #ede7d9;
      --rust:       #b85c2c;
      --rust-light: #d4733f;
      --gold:       #c9a84c;
      --muted:      #7a6f62;
      --border:     #cfc5b4;
      --white:      #ffffff;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      background: var(--ink);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 56px;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--paper);
      text-decoration: none;
    }
    .nav-brand span { color: var(--rust-light); }
    .nav-links { display: flex; gap: 0.4rem; }
    .nav-links a {
      padding: 0.4rem 1rem;
      border-radius: 2px;
      color: var(--paper);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.15s;
    }
    .nav-links a:hover    { background: rgba(255,255,255,0.08); }
    .nav-links a.active   { background: var(--rust); }

    /* ── HERO SEARCH ── */
    .hero {
      background: var(--ink);
      padding: 3rem 3rem 3.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; top: -80px; right: -80px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(201,168,76,0.07);
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -60px; left: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: rgba(184,92,44,0.09);
    }
    .hero-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--paper);
      margin-bottom: 0.5rem;
    }
    .hero h1 span { color: var(--rust-light); }
    .hero-sub {
      color: #9a8f84;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* search bar */
    .search-bar {
      display: flex;
      max-width: 620px;
      margin: 0 auto;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .search-bar input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
    }
    .search-bar input::placeholder { color: #b0a898; }
    .search-bar button {
      padding: 0 1.6rem;
      background: var(--rust);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .search-bar button:hover { background: var(--rust-light); }

    /* ── TOOLBAR ── */
    #toolbar {
      display: none;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 3rem;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .toolbar-info { font-size: 0.85rem; color: var(--muted); }
    .toolbar-info strong { color: var(--ink); }
    .toolbar-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .toolbar-right label { font-size: 0.82rem; color: var(--muted); }
    .toolbar-right select {
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--white);
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--ink);
      cursor: pointer;
    }
    .view-toggle { display: flex; gap: 0.3rem; }
    .view-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 2px; padding: 0.3rem 0.65rem;
      cursor: pointer; font-size: 0.75rem; font-family: inherit;
      color: var(--muted); transition: all 0.15s;
    }
    .view-btn.active { background: var(--rust); border-color: var(--rust); color: #fff; }
    .view-btn:hover:not(.active) { border-color: var(--rust); color: var(--rust); }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    /* ── STATES ── */
    #empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    #empty-state .big-icon { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state p { font-size: 1rem; }

    #loading-state {
      display: none;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .spinner {
      display: inline-block; width: 38px; height: 38px;
      border: 3px solid var(--border); border-top-color: var(--rust);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-state {
      display: none;
      text-align: center;
      padding: 3rem 2rem;
      color: #c0392b;
      font-size: 0.95rem;
    }

    /* ── GRID ── */
    #results-container.grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.4rem;
    }
    #results-container.list { display: flex; flex-direction: column; gap: 1rem; }

    /* GRID CARD */
    .book-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .book-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }

    .grid .cover-wrap {
      background: var(--cream);
      height: 190px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .grid .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .grid .cover-wrap .no-cover {
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem; color: var(--muted);
      text-align: center; padding: 1rem; line-height: 1.4;
    }
    .grid .card-body { padding: 0.8rem; flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .grid .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem; font-weight: 700; line-height: 1.3;
    }
    .grid .card-title a { color: var(--ink); text-decoration: none; }
    .grid .card-title a:hover { color: var(--rust); }
    .grid .card-author { font-size: 0.76rem; color: var(--rust); font-weight: 500; }
    .grid .card-year   { font-size: 0.72rem; color: var(--muted); margin-top: auto; padding-top: 0.3rem; }

    /* LIST CARD */
    .list .book-card { flex-direction: row; }
    .list .cover-wrap {
      width: 80px; min-width: 80px; height: 110px;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .list .cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .list .cover-wrap .no-cover { font-size: 0.65rem; color: var(--muted); text-align: center; padding: 0.5rem; }
    .list .card-body { padding: 0.9rem 1.1rem; flex: 1; display: flex; flex-direction: column; gap: 0.25rem; }
    .list .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
    .list .card-title a { color: var(--ink); text-decoration: none; }
    .list .card-title a:hover { color: var(--rust); }
    .list .card-author { font-size: 0.85rem; color: var(--rust); font-weight: 500; }
    .list .card-desc {
      font-size: 0.8rem; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .list .card-year { font-size: 0.78rem; color: var(--muted); }

    /* ── PAGINATION ── */
    #pagination {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.5rem;
      flex-wrap: wrap;
    }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 0.6rem;
      border: 1px solid var(--border); border-radius: 2px;
      background: var(--white); color: var(--ink);
      font-family: inherit; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .page-btn:hover:not(.active):not([disabled]) { border-color: var(--rust); color: var(--rust); }
    .page-btn.active { background: var(--rust); border-color: var(--rust); color: #fff; cursor: default; }
    .page-btn[disabled] { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-brand">Book<span>Sphere</span></a>
  <div class="nav-links">
    <a href="../index.html">Project Home</a>
    <a href="index.html" class="active">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Find your next <span>great read</span></h1>
  <p class="hero-sub">Search millions of books using the Google Books API</p>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search by title, author, or keyword…" autocomplete="off"/>
    <button id="search-btn">Search</button>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="toolbar-info">
    Results for <strong id="query-label"></strong> — <span id="count-label"></span>
  </div>
  <div class="toolbar-right">
    <div>
      <label for="page-select">Page: </label>
      <select id="page-select"></select>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞ Grid</button>
      <button class="view-btn"        id="btn-list" onclick="setView('list')">☰ List</button>
    </div>
  </div>
</div>

<main>
  <div id="empty-state">
    <div class="big-icon">📚</div>
    <p>Enter a search term above to find books.</p>
  </div>
  <div id="loading-state"><div class="spinner"></div><br>Searching…</div>
  <div id="error-state"></div>
  <div id="results-container" class="grid"></div>
  <div id="pagination"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
  var API_BASE = 'https://www.googleapis.com/books/v1/volumes/'
  var MAX_RESULTS = 60;   // total to fetch
  var PER_PAGE    = 12;   // results shown per page
  var currentView = 'grid';
  var allBooks    = [];
  var currentPage = 1;
  var currentQuery = '';

  function setView(v) {
    currentView = v;
    $('#results-container').removeClass('grid list').addClass(v);
    $('#btn-grid, #btn-list').removeClass('active');
    if (v === 'grid') $('#btn-grid').addClass('active');
    else              $('#btn-list').addClass('active');
  }


  function renderPage(page) {
    currentPage = page;
    var start = (page - 1) * PER_PAGE;
    var slice = allBooks.slice(start, start + PER_PAGE);
    var $c = $('#results-container').empty();

    $.each(slice, function(_, book) {
      var info      = book.volumeInfo || {};
      var title     = info.title     || 'Untitled';
      var authors   = info.authors   ? info.authors.join(', ') : 'Unknown Author';
      var year      = info.publishedDate ? info.publishedDate.substring(0, 4) : '';
      var desc      = info.description || '';
      var thumb     = info.imageLinks && info.imageLinks.smallThumbnail
                        ? info.imageLinks.smallThumbnail.replace('http://', 'https://')
                        : null;
      var bookId    = book.id || '';
      var detailUrl = 'book-detail.html?id=' + encodeURIComponent(bookId);

      var coverHtml = thumb
        ? '<img src="' + thumb + '" alt="' + $('<s>').text(title).html() + '" />'
        : '<div class="no-cover">' + $('<s>').text(title).html() + '</div>';

      var card = $('<div class="book-card">');

      if (currentView === 'grid') {
        card.append(
          '<div class="cover-wrap">' + coverHtml + '</div>' +
          '<div class="card-body">' +
            '<div class="card-title"><a href="' + detailUrl + '">' + $('<s>').text(title).html() + '</a></div>' +
            '<div class="card-author">' + $('<s>').text(authors).html() + '</div>' +
            (year ? '<div class="card-year">' + year + '</div>' : '') +
          '</div>'
        );
      } else {
        card.append(
          '<div class="cover-wrap">' + coverHtml + '</div>' +
          '<div class="card-body">' +
            '<div class="card-title"><a href="' + detailUrl + '">' + $('<s>').text(title).html() + '</a></div>' +
            '<div class="card-author">' + $('<s>').text(authors).html() + '</div>' +
            (desc ? '<div class="card-desc">' + $('<s>').text(desc).html() + '</div>' : '') +
            (year ? '<div class="card-year">' + year + '</div>' : '') +
          '</div>'
        );
      }
      $c.append(card);
    });

    buildPagination();
    updatePageSelect(page);
  }

  /* ── build pagination buttons ── */
  function buildPagination() {
    var totalPages = Math.ceil(allBooks.length / PER_PAGE);
    var $p = $('#pagination').empty().css('display', totalPages > 1 ? 'flex' : 'none');
    if (totalPages <= 1) return;

    $p.append(makePageBtn('‹', currentPage - 1, currentPage === 1));
    for (var i = 1; i <= totalPages; i++) {
      $p.append(makePageBtn(i, i, false, i === currentPage));
    }
    $p.append(makePageBtn('›', currentPage + 1, currentPage === totalPages));
  }

  function makePageBtn(label, targetPage, disabled, active) {
    var btn = $('<button class="page-btn">').text(label);
    if (active)   btn.addClass('active');
    if (disabled) btn.prop('disabled', true);
    if (!disabled && !active) {
      btn.on('click', function() { renderPage(targetPage); $('html,body').animate({scrollTop: 0}, 200); });
    }
    return btn;
  }


  function buildPageSelect(total) {
    var totalPages = Math.ceil(total / PER_PAGE);
    var $sel = $('#page-select').empty();
    for (var i = 1; i <= totalPages; i++) {
      $sel.append($('<option>').val(i).text('Page ' + i));
    }
  }
  function updatePageSelect(page) { $('#page-select').val(page); }

  $('#page-select').on('change', function() {
    renderPage(parseInt($(this).val()));
    $('html,body').animate({scrollTop: 0}, 200);
  });

  function doSearch() {
    var q = $('#search-input').val().trim();
    if (!q) return;
    currentQuery = q;

    $('#empty-state').hide();
    $('#error-state').hide();
    $('#results-container').empty();
    $('#pagination').hide();
    $('#toolbar').hide();
    $('#loading-state').show();

    var requests = [];
    var fetchCount = Math.min(MAX_RESULTS, 60);
    var maxPerReq  = 40;

    for (var start = 0; start < fetchCount; start += maxPerReq) {
      var count = Math.min(maxPerReq, fetchCount - start);
      requests.push(
        $.getJSON(API_BASE, { q: q, maxResults: count, startIndex: start, printType: 'books' })
      );
    }

    $.when.apply($, requests)
      .done(function() {
        $('#loading-state').hide();
        allBooks = [];
        var responses = requests.length === 1 ? [arguments] : Array.prototype.slice.call(arguments);
        $.each(responses, function(_, res) {
          var data  = res[0];
          var items = data.items || [];
          allBooks  = allBooks.concat(items);
        });
        allBooks = allBooks.slice(0, MAX_RESULTS);

        if (allBooks.length === 0) {
          $('#error-state').text('No books found for "' + q + '". Try a different search term.').show();
          return;
        }

        $('#query-label').text('"' + q + '"');
        $('#count-label').text('Showing up to ' + allBooks.length + ' results');
        buildPageSelect(allBooks.length);
        $('#toolbar').css('display', 'flex');
        renderPage(1);
      })
      .fail(function() {
        $('#loading-state').hide();
        $('#error-state').text('Failed to fetch results. Please check your connection and try again.').show();
      });
  }

  $('#search-btn').on('click', doSearch);
  $('#search-input').on('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
</script>

</body>
</html>
