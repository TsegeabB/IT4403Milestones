<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Open Library Book – BookSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1512;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --rust: #b85c2c;
      --rust-light: #d4733f;
      --gold: #c9a84c;
      --muted: #7a6f62;
      --border: #cfc5b4;
    }

    body {
      background: var(--paper); color: var(--ink);
      font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh;
    }

    header {
      background: var(--ink); color: var(--paper);
      padding: 2.5rem 4rem 2rem; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(201,168,76,0.09);
    }
    .header-eyebrow {
      font-size: 0.72rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; color: var(--paper);
    }
    header h1 span { color: var(--rust-light); }
    nav { margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; }
    nav a {
      display: inline-block; padding: 0.4rem 1rem;
      border: 1px solid rgba(205,197,180,0.35); border-radius: 2px;
      color: var(--paper); text-decoration: none;
      font-size: 0.82rem; font-weight: 500;
      transition: background 0.18s, border-color 0.18s;
    }
    nav a:hover { background: rgba(255,255,255,0.08); border-color: var(--gold); color: var(--gold); }
    nav a.active { background: var(--rust); border-color: var(--rust); color: #fff; }

    main { max-width: 980px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    #loading { text-align: center; padding: 4rem 2rem; font-size: 1rem; color: var(--muted); }
    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--rust);
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #book-detail { display: none; }

    .book-hero {
      display: grid; grid-template-columns: 220px 1fr;
      gap: 3rem; margin-bottom: 3rem; align-items: start;
    }
    @media (max-width: 640px) { .book-hero { grid-template-columns: 1fr; } }

    .cover-panel { position: sticky; top: 2rem; }
    .cover-panel img {
      width: 100%; border-radius: 3px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25); display: block;
    }
    .cover-panel .no-cover {
      width: 100%; aspect-ratio: 2/3;
      background: var(--cream); border: 1px solid var(--border); border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1rem;
      color: var(--muted); text-align: center; padding: 1rem;
    }
    .cover-actions { margin-top: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .btn-primary {
      display: block; text-align: center; padding: 0.6rem 1rem;
      background: var(--rust); color: #fff; text-decoration: none;
      border-radius: 2px; font-size: 0.85rem; font-weight: 500;
      border: none; cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--rust-light); }
    .btn-secondary {
      display: block; text-align: center; padding: 0.55rem 1rem;
      background: none; color: var(--ink); text-decoration: none;
      border-radius: 2px; font-size: 0.85rem; font-weight: 500;
      border: 1px solid var(--border); cursor: pointer; font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--rust); color: var(--rust); }

    .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .chip {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 0.2rem 0.6rem;
      border-radius: 2px; border: 1px solid var(--border);
      background: var(--cream); color: var(--muted);
    }
    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 900;
      line-height: 1.1; color: var(--ink); margin-bottom: 0.4rem;
    }
    .book-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem; color: var(--muted); font-style: italic; margin-bottom: 1rem;
    }
    .book-authors { font-size: 1rem; color: var(--rust); font-weight: 500; margin-bottom: 1.4rem; }

    .meta-section { margin-bottom: 2.5rem; }
    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; margin-bottom: 0.8rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
    }
    .meta-table { width: 100%; border-collapse: collapse; }
    .meta-table tr { border-bottom: 1px solid #e8e2d8; }
    .meta-table tr:last-child { border-bottom: none; }
    .meta-table th {
      width: 38%; padding: 0.55rem 0.5rem 0.55rem 0;
      text-align: left; font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); vertical-align: top;
    }
    .meta-table td { padding: 0.55rem 0; font-size: 0.88rem; color: var(--ink); line-height: 1.5; }
    .meta-table td a { color: var(--rust); text-decoration: none; }
    .meta-table td a:hover { text-decoration: underline; }

    .toc-list { list-style: none; counter-reset: toc; }
    .toc-list li {
      counter-increment: toc;
      display: flex; align-items: baseline; gap: 0.6rem;
      padding: 0.45rem 0; border-bottom: 1px solid #ede7d9; font-size: 0.88rem;
    }
    .toc-list li:last-child { border-bottom: none; }
    .toc-list li::before {
      content: counter(toc);
      min-width: 1.8rem; font-size: 0.72rem; font-weight: 500;
      color: var(--muted); text-align: right;
    }

    .id-list { list-style: none; }
    .id-list li { font-size: 0.87rem; margin-bottom: 0.3rem; }
    .id-type {
      display: inline-block; min-width: 90px;
      font-size: 0.7rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
    }

    .cover-sizes { display: flex; gap: 1.2rem; flex-wrap: wrap; align-items: flex-end; }
    .cover-size-item { text-align: center; }
    .cover-size-item img { border: 1px solid var(--border); border-radius: 2px; display: block; }
    .cover-size-item .label { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.06em; }

    .place-list { list-style: none; }
    .place-list li { font-size: 0.88rem; padding: 0.3rem 0; border-bottom: 1px solid #ede7d9; }
    .place-list li:last-child { border-bottom: none; }
  </style>
</head>
<body>

<header>
  <h1>Book<span>Sphere</span> — Open Library Book</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="google-books-search.html">Google Books Search</a>
    <a href="google-books-book.html">Book Detail</a>
    <a href="it-ebooks-search.html">IT eBooks Search</a>
    <a href="openlibrary-search.html">Open Library Search</a>
    <a href="openlibrary-book.html" class="active">Open Library Book</a>
    <a href="milestone2/index.html">M2 Book search</a>
    <a href="milestone2/bookshelf.html">M2 My bookshelf</a> 
  </nav>
</header>

<main>
  <div id="loading"><div class="spinner"></div><br>Loading book details…</div>
  <div id="error-msg" style="color:#c0392b;padding:2rem;display:none;"></div>
  <div id="book-detail"></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
  $(document).ready(function() {
    $.getJSON('openlibrary-book.json')
      .done(function(data) {
        $('#loading').hide();

        var key  = Object.keys(data)[0];
        var book = data[key];

        var title       = book.title         || 'Untitled';
        var subtitle    = book.subtitle      || '';
        var pubDate     = book.publish_date  || '—';
        var pagination  = book.pagination    || '—';
        var url         = book.url           || null;
        var authors     = book.authors       || [];
        var publishers  = book.publishers    || [];
        var places      = book.publish_places || [];
        var toc         = book.table_of_contents || [];
        var identifiers = book.identifiers   || {};
        var cover       = book.cover         || {};

        var authorNames    = authors.map(function(a) { return a.name; }).join(', ') || 'Unknown Author';
        var publisherNames = publishers.map(function(p) { return p.name; }).join(', ') || '—';

        var coverLarge = cover.large  ? cover.large.replace('http://', 'https://')  : null;
        var coverMed   = cover.medium ? cover.medium.replace('http://', 'https://') : null;
        var coverSmall = cover.small  ? cover.small.replace('http://', 'https://')  : null;

        var coverImgHtml = coverLarge
          ? '<img src="' + coverLarge + '" alt="Cover of ' + $('<span>').text(title).html() + '" />'
          : '<div class="no-cover">No Cover Available</div>';

        var actionsHtml = '<div class="cover-actions">';
        if (url) actionsHtml += '<a href="' + url + '" target="_blank" class="btn-primary">View on Open Library ↗</a>';
        if (authors.length && authors[0].url)
          actionsHtml += '<a href="' + authors[0].url + '" target="_blank" class="btn-secondary">Author Page ↗</a>';
        actionsHtml += '</div>';

        var chipsHtml = '<div class="chips"><span class="chip">Open Library</span>';
        if (pubDate) chipsHtml += '<span class="chip">' + $('<span>').text(pubDate).html() + '</span>';
        chipsHtml += '</div>';

        var idHtml = '<ul class="id-list">';
        $.each(identifiers, function(type, vals) {
          $.each(vals, function(_, v) {
            idHtml += '<li><span class="id-type">' + type.replace('_', ' ').toUpperCase() + '</span> ' + v + '</li>';
          });
        });
        idHtml += '</ul>';

        var pubHtml =
          '<table class="meta-table">' +
            '<tr><th>Publisher</th><td>' + $('<span>').text(publisherNames).html() + '</td></tr>' +
            '<tr><th>Published</th><td>' + $('<span>').text(pubDate).html()        + '</td></tr>' +
            '<tr><th>Pagination</th><td>' + $('<span>').text(pagination).html()    + '</td></tr>' +
            '<tr><th>Author(s)</th><td>' +
              authors.map(function(a) {
                return a.url
                  ? '<a href="' + a.url + '" target="_blank">' + $('<span>').text(a.name).html() + '</a>'
                  : $('<span>').text(a.name).html();
              }).join(', ') +
            '</td></tr>' +
          '</table>';

        var placesHtml = '—';
        if (places.length) {
          placesHtml = '<ul class="place-list">';
          $.each(places, function(_, p) {
            placesHtml += '<li>' + $('<span>').text(p.name).html() + '</li>';
          });
          placesHtml += '</ul>';
        }

        var tocHtml = '<p style="color:var(--muted);font-size:0.88rem;">Not available.</p>';
        if (toc.length) {
          tocHtml = '<ol class="toc-list">';
          $.each(toc, function(_, chapter) {
            tocHtml += '<li>' + $('<span>').text(chapter.title).html() + '</li>';
          });
          tocHtml += '</ol>';
        }

        var coverSizesHtml = '';
        if (coverSmall || coverMed) {
          coverSizesHtml =
            '<div class="meta-section">' +
              '<h2 class="section-heading">Cover Images</h2>' +
              '<div class="cover-sizes">';
          if (coverSmall) coverSizesHtml += '<div class="cover-size-item"><img src="' + coverSmall + '" alt="Small cover" /><div class="label">Small</div></div>';
          if (coverMed)   coverSizesHtml += '<div class="cover-size-item"><img src="' + coverMed   + '" alt="Medium cover" /><div class="label">Medium</div></div>';
          coverSizesHtml += '</div></div>';
        }

        var html =
          '<div class="book-hero">' +
            '<div class="cover-panel">' + coverImgHtml + actionsHtml + '</div>' +
            '<div class="book-info">' +
              chipsHtml +
              '<h1 class="book-title">' + $('<span>').text(title).html() + '</h1>' +
              (subtitle ? '<p class="book-subtitle">' + $('<span>').text(subtitle).html() + '</p>' : '') +
              '<p class="book-authors">By ' + $('<span>').text(authorNames).html() + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="meta-section"><h2 class="section-heading">Publication Details</h2>' + pubHtml + '</div>' +
          '<div class="meta-section"><h2 class="section-heading">Publish Places</h2>'      + placesHtml + '</div>' +
          '<div class="meta-section"><h2 class="section-heading">Identifiers</h2>'         + idHtml + '</div>' +
          coverSizesHtml +
          '<div class="meta-section"><h2 class="section-heading">Table of Contents</h2>'  + tocHtml + '</div>';

        $('#book-detail').html(html).show();
      })
      .fail(function(jqxhr, status, err) {
        $('#loading').hide();
        $('#error-msg').text('Failed to load Open Library book data: ' + err).show();
      });
  });
</script>

</body>
</html>
